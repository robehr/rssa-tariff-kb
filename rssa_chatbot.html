<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSSA Tariff Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #chat-container {
    width: 100%;
    max-width: 700px;
    height: 100vh;
    max-height: 750px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  /* Header */
  #chat-header {
    background: linear-gradient(135deg, #00529B 0%, #003f78 100%);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  #chat-header .logo {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    flex-shrink: 0;
  }

  #chat-header .info h2 {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
  }

  #chat-header .info p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }

  #header-right {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  #rssa-logo {
    height: 52px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
  }

  #status-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Disclaimer banner */
  #disclaimer {
    background: #fff8e1;
    border-bottom: 1px solid #ffe082;
    padding: 8px 16px;
    font-size: 11.5px;
    color: #6d4c00;
    text-align: center;
    flex-shrink: 0;
  }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }

  .message.bot .bubble {
    background: #f1f3f6;
    color: #1a1a1a;
    border-bottom-left-radius: 4px;
  }

  .message.user .bubble {
    background: #00529B;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message .meta {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .meta { text-align: right; }

  /* Source badge */
  .source-badge {
    display: inline-block;
    background: #e8f0fe;
    color: #1a56db;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
  }

  .source-badge.guideline {
    background: #e6f4ea;
    color: #137333;
  }

  .source-badge.tariff {
    background: #eff6ff;
    color: #1d4ed8;
  }

  /* Quick suggestions */
  #suggestions {
    padding: 8px 16px 4px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    border-top: 1px solid #eee;
    background: #fafafa;
  }

  #suggestions span {
    font-size: 11px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .suggestion-chip {
    background: #e8f0fe;
    color: #1a56db;
    border: none;
    padding: 5px 12px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .suggestion-chip:hover { background: #c7d9fc; }

  /* Input area */
  #input-area {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    border-top: 1px solid #e8e8e8;
    background: #fff;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    border: 1.5px solid #d0d5dd;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  #user-input:focus { border-color: #00529B; }

  #send-btn {
    width: 42px;
    height: 42px;
    background: #00529B;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  #send-btn:hover { background: #003f78; }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { background: #ccc; cursor: not-allowed; }

  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* Loading dots */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: #f1f3f6;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 10px; }

  /* Mobile */
  @media (max-width: 600px) {
    body { background: #fff; align-items: flex-start; }
    #chat-container { max-height: 100vh; border-radius: 0; box-shadow: none; }
    .message { max-width: 92%; }
  }
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">
    <div class="logo">R</div>
    <div class="info">
      <h2>RSSA Tariff Assistant</h2>
      <p>Radiological Society of South Africa · Members Only</p>
    </div>
    <div id="header-right">
      <img id="rssa-logo"
           src="rssa_logo.png"
           alt="RSSA Logo"
           onerror="this.style.display='none'">
      <div id="status-dot"></div>
    </div>
  </div>

  <div id="disclaimer">
    Answers are based on approved RSSA reference documents only. For complex billing queries, contact the RSSA office.
  </div>

  <div id="messages">
    <!-- Populated by JS -->
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask about a tariff code or billing question…" maxlength="500"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ─── CONFIGURATION ────────────────────────────────────────────────────────────
// Replace this URL with your actual GitHub raw JSON URL after uploading
const DATA_URL = 'https://raw.githubusercontent.com/robehr/rssa-tariff-kb/refs/heads/main/rssa_knowledge.json';
const TARIFFS_URL = 'https://raw.githubusercontent.com/robehr/rssa-tariff-kb/refs/heads/main/radiology_tariffs.json';

// Minimum keyword match score to return an answer (0–1)
const CONFIDENCE_THRESHOLD = 0.07;

// ─── STATE ────────────────────────────────────────────────────────────────────
let kb = null;        // loaded knowledge base
let tariffs = null;   // loaded radiology tariffs
let loadError = false;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  autoGrow();
  addMessage('bot', `Hello! I'm the RSSA Tariff Assistant. I can help you find information about radiology billing codes and tariff guidelines from approved RSSA documents.\n\nType a billing code (e.g. <strong>50130</strong>) or ask a question about tariffs and billing.`);
  loadKnowledgeBase();
});

function autoGrow() {
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

// ─── KNOWLEDGE BASE LOADER ───────────────────────────────────────────────────
async function loadKnowledgeBase() {
  try {
    const [kbRes, tariffRes] = await Promise.all([fetch(DATA_URL), fetch(TARIFFS_URL)]);
    if (!kbRes.ok) throw new Error(`KB HTTP ${kbRes.status}`);
    if (!tariffRes.ok) throw new Error(`Tariffs HTTP ${tariffRes.status}`);
    kb = await kbRes.json();
    tariffs = await tariffRes.json();
    console.log(`[RSSA] Knowledge base loaded: ${kb.total_entries} entries (v${kb.version})`);
    console.log(`[RSSA] Tariffs loaded: ${Object.keys(tariffs).length} codes`);
  } catch (err) {
    console.warn('[RSSA] Could not load data:', err.message);
    loadError = true;
  }
}

// ─── SEARCH ENGINE ────────────────────────────────────────────────────────────
const CODE_RE = /\b\d{5}\b/g;
// Stop words aligned with the knowledge-base generator (process_data.py) so that
// domain terms stored in entry keywords (fee, tariff, patient, medical, etc.)
// are NOT stripped from user queries — keeping them improves match scores.
const STOP = new Set(['what','is','the','a','an','of','for','in','on','at','to','and',
  'or','can','i','do','how','does','when','are','was','with','about','please',
  'tell','me','my','this','that','it','be','have','has','by','from','not','if',
  'we','they','he','she','you','your','our','their','which',
  'billing','bill','charge','would','should','could','will','use','using','used',
  'per','done','also','both','either','each','more','most','other','some','such',
  'than','then','where','who','why','these','those','its','no','any','all',
  'only','may','might','shall','did','had','were','been']);

function extractCodes(text) {
  return [...new Set((text.match(CODE_RE) || []))];
}

function tokenise(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length >= 2 && !STOP.has(w));
}

function score(entry, queryCodes, queryTokens) {
  let s = 0;

  // Code match: strongest signal
  if (queryCodes.length > 0) {
    const matched = queryCodes.filter(c => entry.codes.includes(c)).length;
    s += matched * 2.0;
  }

  // Keyword overlap
  const entryWords = new Set(entry.keywords || []);
  const overlap = queryTokens.filter(t => entryWords.has(t)).length;
  const union   = new Set([...queryTokens, ...entryWords]).size;
  if (union > 0) s += overlap / union;

  // Priority bonus (2026 FAQ > 2019 FAQ > guidelines)
  s += (entry.priority === 1 ? 0.05 : entry.priority === 2 ? 0.02 : 0);

  return s;
}

function search(query) {
  if (!kb) return null;

  const queryCodes  = extractCodes(query);
  const queryTokens = tokenise(query);

  if (queryCodes.length === 0 && queryTokens.length === 0) return null;

  let best = null;
  let bestScore = 0;

  for (const entry of kb.entries) {
    const s = score(entry, queryCodes, queryTokens);
    if (s > bestScore) { bestScore = s; best = entry; }
  }

  // If a code was matched in the KB its score is ≥2.0, which easily clears
  // CONFIDENCE_THRESHOLD. Using a single threshold avoids the old 0.5 trap
  // where a valid code query failed if the code wasn't in the KB (score→0).
  return bestScore >= CONFIDENCE_THRESHOLD ? { entry: best, score: bestScore } : null;
}

// ─── MESSAGE HANDLERS ─────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  addMessage('user', escHtml(text));
  document.getElementById('send-btn').disabled = true;

  const typingId = addTyping();

  setTimeout(() => {
    removeTyping(typingId);
    const reply = generateReply(text);
    addMessage('bot', reply.html, reply.source, reply.sourceType);
    document.getElementById('send-btn').disabled = false;
  }, 600 + Math.random() * 400);
}

function askSuggestion(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

function generateReply(query) {
  // Not yet loaded
  if (!kb && !loadError) {
    return { html: 'Still loading the knowledge base — please try again in a moment.', source: null };
  }

  if (loadError) {
    return {
      html: `⚠️ The knowledge base could not be loaded. Please check that the <code>DATA_URL</code> in the chatbot points to your uploaded <code>rssa_knowledge.json</code> on GitHub.`,
      source: null
    };
  }

  const result = search(query);
  const queriedCodes = extractCodes(query);

  // For a specific code query: prefer tariff lookup when the KB result did NOT
  // explicitly match that code (i.e. it was only a keyword/false-positive match).
  for (const code of queriedCodes) {
    if (tariffs[code] && (!result || !result.entry.codes.includes(code))) {
      const t = tariffs[code];
      let tHtml = `Here are the details for tariff code <strong>${escHtml(code)}</strong> — there is no specific FAQ guidance on file for this code.<br><br>`;
      tHtml += `<strong>Tariff Description:</strong> ${escHtml(t.tariff_desc || '\u2014')}<br>`;
      tHtml += `<strong>Main Anatomical Region:</strong> ${escHtml(t.tariff_main_anatomical_desc || '\u2014')}<br>`;
      tHtml += `<strong>Sub Anatomical Region:</strong> ${escHtml(t.tariff_sub_anatomical_desc || '\u2014')}<br>`;
      tHtml += `<strong>Treatment Modality:</strong> ${escHtml(t.treatment_modality_desc || '\u2014')}<br>`;
      tHtml += `<strong>Analysis Category:</strong> ${escHtml(t.tariff_analysis_category_desc || '\u2014')}<br>`;
      tHtml += `<strong>High / Low Tech:</strong> ${escHtml(t.high_low_tech_desc || '\u2014')}`;
      return { html: tHtml, source: 'Radiology Tariffs 2025', sourceType: 'tariff' };
    }
  }

  if (!result) {
    // Check radiology tariffs lookup for specific tariff codes
    const queriedCodes = extractCodes(query);
    for (const code of queriedCodes) {
      if (tariffs[code]) {
        const t = tariffs[code];
        let tHtml = `Here are the details for tariff code <strong>${escHtml(code)}</strong> — there is no specific FAQ guidance on file for this code.<br><br>`;
        tHtml += `<strong>Tariff Description:</strong> ${escHtml(t.tariff_desc || '\u2014')}<br>`;
        tHtml += `<strong>Main Anatomical Region:</strong> ${escHtml(t.tariff_main_anatomical_desc || '\u2014')}<br>`;
        tHtml += `<strong>Sub Anatomical Region:</strong> ${escHtml(t.tariff_sub_anatomical_desc || '\u2014')}<br>`;
        tHtml += `<strong>Treatment Modality:</strong> ${escHtml(t.treatment_modality_desc || '\u2014')}<br>`;
        tHtml += `<strong>Analysis Category:</strong> ${escHtml(t.tariff_analysis_category_desc || '\u2014')}<br>`;
        tHtml += `<strong>High / Low Tech:</strong> ${escHtml(t.high_low_tech_desc || '\u2014')}`;
        return { html: tHtml, source: 'Radiology Tariffs 2025', sourceType: 'tariff' };
      }
    }
    const fallback = kb.fallback_message ||
      'There has been no similar query to the RSSA - please contact the RSSA office and ask for more information.';
    return { html: escHtml(fallback), source: null };
  }
  const e = result.entry;
  let html = '';

  // If a specific tariff code was queried and exists in the tariff database,
  // always show tariff details first before the FAQ answer.
  const matchedTariffCode = queriedCodes.find(code => tariffs[code]);
  if (matchedTariffCode) {
    const t = tariffs[matchedTariffCode];
    html += `Here are the tariff details for code <strong>${escHtml(matchedTariffCode)}</strong>:<br><br>`;
    html += `<strong>Tariff Description:</strong> ${escHtml(t.tariff_desc || '\u2014')}<br>`;
    html += `<strong>Main Anatomical Region:</strong> ${escHtml(t.tariff_main_anatomical_desc || '\u2014')}<br>`;
    html += `<strong>Sub Anatomical Region:</strong> ${escHtml(t.tariff_sub_anatomical_desc || '\u2014')}<br>`;
    html += `<strong>Treatment Modality:</strong> ${escHtml(t.treatment_modality_desc || '\u2014')}<br>`;
    html += `<strong>Analysis Category:</strong> ${escHtml(t.tariff_analysis_category_desc || '\u2014')}<br>`;
    html += `<strong>High / Low Tech:</strong> ${escHtml(t.high_low_tech_desc || '\u2014')}`;
    html += `<br><br><hr style="border:none;border-top:1px solid #ccc;margin:10px 0;"><br>`;
  }

  // Render the answer — strip email artefacts first
  const answerText = cleanAnswer(e.answer);
  if (!answerText || answerText.length < 10) {
    // Answer became empty after cleaning (was only attachment references)
    const fallback = kb.fallback_message ||
      'There has been no similar query to the RSSA — please contact the RSSA office and ask for more information.';
    return { html: escHtml(fallback), source: null };
  }
  html += escHtml(answerText).replace(/\n/g, '<br>');

  // Multiple codes
  if (e.codes && e.codes.length > 1) {
    html += `<br><br><small><strong>Related codes:</strong> ${e.codes.map(escHtml).join(', ')}</small>`;
  }

  const sourceType = e.source === 'billing_guidelines' ? 'guideline' : 'faq';
  const sourceLabel = e.source_doc || (e.source === 'FAQ_2026' ? 'RSSA FAQ 2026' :
                       e.source === 'FAQ_2019' ? 'RSSA FAQ 2019' : 'RSSA Billing Guidelines');

  return { html, source: sourceLabel, sourceType };
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function addMessage(role, html, source, sourceType) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrapper.appendChild(bubble);

  if (source) {
    const badge = document.createElement('span');
    badge.className = `source-badge ${sourceType || ''}`;
    badge.textContent = `Source: ${source}`;
    wrapper.appendChild(badge);
  }

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = role === 'bot' ? 'RSSA Tariff Assistant' : 'You';
  wrapper.appendChild(meta);

  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  return wrapper;
}

let typingCounter = 0;
function addTyping() {
  const id = ++typingCounter;
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message bot';
  wrapper.id = `typing-${id}`;
  wrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(`typing-${id}`);
  if (el) el.remove();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function cleanAnswer(text) {
  if (!text) return text;

  // Remove sentences that reference email attachments — the source FAQs were email
  // replies and often reference attached files that don't exist in this context.
  const sentencePatterns = [
    /[^.]*?\bI have attached\b[^.]*\.?/gi,
    /[^.]*?\bplease (?:find|see)(?: the)? attached\b[^.]*\.?/gi,
    /[^.]*?\bsee(?: the)? attached\b[^.]*\.?/gi,
    /[^.]*?\bas per(?: the)? attached\b[^.]*\.?/gi,
    /[^.]*?\bcopies? attached\b[^.]*\.?/gi,
    /[^.]*?\battached (?:for reference|herewith|hereto)\b[^.]*\.?/gi,
    /[^.]*?\battached (?:account|referral|report|notice|document|file|guideline|recommendation|list)\b[^.]*\.?/gi,
    /Response included attachments?\s*/gi,
  ];
  for (const re of sentencePatterns) {
    text = text.replace(re, '');
  }

  // Remove parenthetical attachment notes e.g. "(Full Ethical Rules attached)"
  text = text.replace(/\([^)]*\battached\b[^)]*\)/gi, '');

  // Collapse extra whitespace
  text = text.replace(/[ \t]{2,}/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
  return text;
}
</script>
</body>
</html>
